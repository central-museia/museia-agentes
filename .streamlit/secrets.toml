# ==================================================
# 🌐 NOCODB (CENTRAL DE INTELIGÊNCIA)
# ==================================================
[nocodb]
url = "https://SEU_PROJETO.nocodb.com/api/v2/tables/AGENTES/records"
api_key = "SEU_TOKEN"

# URLs Limpas e com .com (Conforme seus IDs reais)
url_agentes = "https://app.nocodb.com/api/v2/tables/m8jb1cx6u4ppr3v/records"
url_colecoes = "https://app.nocodb.com/api/v2/tables/mo1nsg6dcef3jox/records"
url_perfis = "https://app.nocodb.com/api/v2/tables/maq8xt1jx8qlw8y/records"
url_usuarios = "https://app.nocodb.com/api/v2/tables/mkg6oy4mdg7030w/records"

# ==================================================
# 🤖 IA (CÉREBRO DOS AGENTES)
# ==================================================
[ia]
gemini_key = "SUA_GEMINI_KEY_AQUI"

# ==================================================
# 💳 PAGAMENTOS (INTEGRAÇÃO COMERCIAL)
# ==================================================
[pagamentos]
provider = "mercadopago"
public_key = "SUA_PUBLIC_KEY_AQUI"
access_token = "SEU_ACCESS_TOKEN_AQUI"
url_sucesso = "https://museia.streamlit.app"

# ==================================================
# 🔐 APP (IDENTIDADE E SEGURANÇA)
# ==================================================
[app]
title = "MuseIA Digital"
admin_email = "contato.museia@gmail.com"
modo_debug = true
versao = "2.0.0"

# ==================================================
# 🌍 REQUESTS / NAVEGAÇÃO
# ==================================================
[requests]
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) MuseIA/2.0"
timeout = 15

# ==================================================
# 📁 STORAGE / ANEXOS
# ==================================================
[storage]
# Caso use S3 ou Google Cloud Storage no futuro
bucket_name = "museia-assets"
api_key = ""
