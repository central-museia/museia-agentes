# ==============================
# 🌐 NOCODB (BANCO DE DADOS)
# ==============================
[nocodb]
url = "https://SEU-NOCODB.com"
api_key = "SUA_API_KEY"

# ==============================
# 🤖 IA (GEMINI)
# ==============================
[ia]
gemini_key = "SUA_GEMINI_KEY"

# ==============================
# 💳 PAGAMENTOS (MERCADO PAGO)
# ==============================
[pagamentos]
provider = "mercadopago"
public_key = "SUA_PUBLIC_KEY"
access_token = "SEU_ACCESS_TOKEN"

# ==============================
# 🔐 APP (CONTROLE INTERNO)
# ==============================
[app]
admin_email = "seu@email.com"
modo_debug = true

# ==============================
# 🌍 REQUESTS / SCRAPING
# ==============================
[requests]
user_agent = "Mozilla/5.0 (MuseIA Bot)"

# ==============================
# 📁 STORAGE (FUTURO)
# ==============================
[storage]
bucket_url = ""
api_key = ""
