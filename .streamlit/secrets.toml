# ==================================================
# 🌐 NOCODB (CENTRAL DE INTELIGÊNCIA)
# ==================================================
[nocodb]
# URL base do NocoDB
url_base = "https://app.nocodb.io/api/v2/tables/"
api_key = "SEU_TOKEN_AQUI" # Substitua pelo seu xc-token

# IDs das Tabelas (Substitua pelos IDs reais do seu painel NocoDB)
# O ID geralmente começa com 'm' e aparece na URL do seu navegador ao abrir a tabela
url_agentes = "https://app.nocodb.io/api/v2/tables/ID_DA_TABELA_AGENTES/records"
url_colecoes = "https://app.nocodb.io/api/v2/tables/ID_DA_TABELA_COLECOES/records"
url_perfis = "https://app.nocodb.io/api/v2/tables/ID_DA_TABELA_PERFIS/records"
url_usuarios = "https://app.nocodb.io/api/v2/tables/ID_DA_TABELA_USUARIOS/records"

# ==================================================
# 🤖 IA (CÉREBRO DOS AGENTES)
# ==================================================
[ia]
gemini_key = "SUA_GEMINI_KEY_AQUI"

# ==================================================
# 💳 PAGAMENTOS (INTEGRAÇÃO COMERCIAL)
# ==================================================
[pagamentos]
provider = "mercadopago"
public_key = "SUA_PUBLIC_KEY_AQUI"
access_token = "SEU_ACCESS_TOKEN_AQUI"
url_sucesso = "https://museia.streamlit.app"

# ==================================================
# 🔐 APP (IDENTIDADE E SEGURANÇA)
# ==================================================
[app]
title = "MuseIA Digital"
admin_email = "contato.museia@gmail.com"
modo_debug = true
versao = "2.0.0"

# ==================================================
# 🌍 REQUESTS / NAVEGAÇÃO
# ==================================================
[requests]
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) MuseIA/2.0"
timeout = 15

# ==================================================
# 📁 STORAGE / ANEXOS
# ==================================================
[storage]
# Caso use S3 ou Google Cloud Storage no futuro
bucket_name = "museia-assets"
api_key = ""
